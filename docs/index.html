<script>
// === HERRAMIENTAS PARA MAPA DE CUBA ===

// 1. Botón de vista inicial
var homeButton = document.createElement('div');
homeButton.innerHTML = '🏠';
homeButton.title = 'Centrar mapa en Cuba';
homeButton.style.cssText = 'position:absolute;top:135px;left:6px;background:white;padding:2px 6px;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,0.2);cursor:pointer;z-index:10000;font-size:14px;line-height:1';homeButton.onclick = function() {
    map.getView().setCenter(ol.proj.fromLonLat([-79.0, 21.5]));
    map.getView().setZoom(6);
};
document.getElementById('map').appendChild(homeButton);







// 3. Mostrar coordenadas al hacer clic (VERSIÓN CORREGIDA)
var coordDisplay = document.createElement('div');
coordDisplay.style.cssText = 'position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,0.75);color:#ffd966;padding:6px 12px;border-radius:4px;font-size:12px;font-family:monospace;z-index:10000;border-left:3px solid #ffd966;pointer-events:none';
document.getElementById('map').appendChild(coordDisplay);

// Asegurar que el mapa existe y agregar el evento
if (typeof map !== 'undefined') {
    map.on('click', function(evt) {
        try {
            // Intentar obtener coordenadas en diferentes formatos
            var coords;
            if (evt.coordinate) {
                coords = ol.proj.toLonLat(evt.coordinate);
            } else if (evt.mapBrowserEvent && evt.mapBrowserEvent.coordinate) {
                coords = ol.proj.toLonLat(evt.mapBrowserEvent.coordinate);
            } else {
                coordDisplay.innerHTML = '📍 Coordenadas no disponibles';
                return;
            }
            
            var lon = coords[0].toFixed(5);
            var lat = coords[1].toFixed(5);
            coordDisplay.innerHTML = '📍 Long: ' + lon + '° | Lat: ' + lat + '°';
            
            // También mostrar en consola para depuración (opcional)
            console.log('Clic en:', lon, lat);
        } catch(e) {
            coordDisplay.innerHTML = '📍 Error al obtener coordenadas';
            console.log('Error:', e);
        }
    });
} else {
    coordDisplay.innerHTML = '📍 Mapa no listo';
    console.log('Variable "map" no encontrada');
}
</script>


<div id="mi-escala-texto" style="position:fixed; bottom:10px; left:550px; background-color:black; padding:5px 10px; border-radius:4px; color:#ffd966; font-size:14px; font-family:monospace; z-index:99999;">1:10.000</div>

<script>
function actualizarMiEscala() {
    var zoom = map.getView().getZoom();
    var texto = '';
    if (zoom >= 18) texto = '1:1.000';
    else if (zoom >= 17) texto = '1:2.000';
    else if (zoom >= 16) texto = '1:4.000';
    else if (zoom >= 15) texto = '1:8.000';
    else if (zoom >= 14) texto = '1:15.000';
    else if (zoom >= 13) texto = '1:30.000';
    else if (zoom >= 12) texto = '1:60.000';
    else if (zoom >= 11) texto = '1:120.000';
    else if (zoom >= 10) texto = '1:250.000';
    else if (zoom >= 9) texto = '1:500.000';
    else if (zoom >= 8) texto = '1:1.000.000';
    else if (zoom >= 7) texto = '1:2.000.000';
    else if (zoom >= 6) texto = '1:4.000.000';
    else texto = '1:20.000.000';
    
    document.getElementById('mi-escala-texto').innerHTML = texto;
}

setTimeout(function() {
    actualizarMiEscala();
    map.getView().on('change:resolution', actualizarMiEscala);
}, 2000);
</script>
